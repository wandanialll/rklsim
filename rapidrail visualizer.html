<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RapidRail frequency visualizer</title>
<style>
  :root {
    --bg: #0b0f14;
    --panel: #121820;
    --panel-2: #171f2a;
    --border: #253141;
    --text: #e7edf3;
    --text-dim: #8a97a8;
    --text-mute: #566274;
    --accent: #4fb3ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  #app { max-width: 1000px; margin: 0 auto; padding: 16px; padding-bottom: 40px; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .chip {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; padding: 6px 10px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--panel-2);
    color: var(--text-dim); cursor: pointer; user-select: none;
    transition: opacity .15s;
  }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .chip.off { opacity: 0.35; }
  .chip.all { color: var(--text-dim); border-style: dashed; }

  .controls {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 10px; font-size: 13px;
  }
  .controls button {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 7px; padding: 6px 10px; font-size: 12px; cursor: pointer;
  }
  .controls button:hover { border-color: var(--accent); }
  .controls button.active { border-color: var(--accent); color: var(--accent); }
  .grow { flex: 1; min-width: 140px; display: flex; align-items: center; gap: 8px; }
  input[type=range] { flex: 1; accent-color: var(--accent); }
  select {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 7px; padding: 6px 8px; font-size: 12px;
  }
  .clock { font-variant-numeric: tabular-nums; font-size: 15px; font-weight: 600; min-width: 78px; }
  .label { color: var(--text-mute); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }

  .mapwrap {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px; position: relative;
  }
  svg { width: 100%; height: auto; display: block; }
  .track { fill: none; stroke-width: 3; opacity: 0.55; }
  .stopdot { fill: #0b0f14; stroke-width: 1.4; r: 2.6; cursor: pointer; }
  .stopdot.pinned { stroke-width: 2.4; fill-opacity: 1; }
  .train { r: 4.2; stroke: #0b0f14; stroke-width: 1; cursor: pointer; }
  .train.dwell { r: 5; }
  .train.pinned { stroke: #ffffff; stroke-width: 2; }

  .footer { display:flex; justify-content: space-between; align-items:center; margin-top: 8px; font-size: 11px; color: var(--text-mute); }
  .count { font-size: 12px; color: var(--text-dim); }

  /* hover tooltip */
  #tooltip {
    position: fixed; pointer-events: none; z-index: 50;
    background: var(--panel-2); border: 1px solid var(--border-strong, var(--border));
    border-radius: 8px; padding: 8px 10px; font-size: 12px; line-height: 1.5;
    color: var(--text); max-width: 220px; display: none; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  #tooltip .tt-title { font-weight: 600; margin-bottom: 2px; }
  #tooltip .tt-line { color: var(--text-dim); }

  /* bottom sheet */
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    opacity: 0; pointer-events: none; transition: opacity .18s; z-index: 40;
  }
  #overlay.open { opacity: 1; pointer-events: auto; }
  #sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 41;
    background: var(--panel); border-top: 1px solid var(--border);
    border-radius: 14px 14px 0 0; padding: 16px 18px 20px;
    max-width: 1000px; margin: 0 auto;
    transform: translateY(105%); transition: transform .22s ease-out;
    max-height: 60vh; overflow-y: auto;
  }
  #sheet.open { transform: translateY(0); }
  #sheet .sheet-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  #sheet .sheet-title { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 600; }
  #sheet .sheet-title .swatch { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  #sheet .sheet-sub { color: var(--text-dim); font-size: 12px; margin-top: 2px; }
  #sheet .closeBtn {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text-dim);
    border-radius: 7px; width: 28px; height: 28px; cursor: pointer; font-size: 14px; line-height: 1;
  }
  .sheet-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-top: 1px solid var(--border); font-size: 13px;
  }
  .sheet-row:first-of-type { border-top: none; }
  .sheet-row .rowlabel { color: var(--text-dim); }
  .sheet-row .rowval { font-variant-numeric: tabular-nums; font-weight: 500; }
  .direction-block { margin-bottom: 12px; }
  .direction-block .dirlabel { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; display:flex; justify-content: space-between; }
  .arrival-chip {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 7px;
    padding: 5px 9px; font-size: 12px; margin-right: 6px; font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<div id="app">

  <div class="chips" id="chips"></div>

  <div class="controls">
    <button id="playBtn">Pause</button>
    <div class="grow">
      <span class="label">Speed</span>
      <input type="range" id="speed" min="0" max="6" step="1" value="4">
      <span id="speedLabel" style="min-width:38px;">30x</span>
    </div>
    <div class="clock" id="clock">--:--:--</div>
    <button id="nowBtn">Now</button>
    <select id="daySelect">
      <option value="MonFri">Mon-Fri</option>
      <option value="Sat">Saturday</option>
      <option value="Sun">Sunday</option>
    </select>
  </div>

  <div class="mapwrap">
    <svg id="map" viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div class="footer">
    <span>Klang Valley rail network — schedule-accurate simulation from GTFS frequencies</span>
    <span class="count" id="trainCount">0 trains active</span>
  </div>

</div>

<div id="tooltip"></div>
<div id="overlay"></div>
<div id="sheet">
  <div class="sheet-head">
    <div>
      <div class="sheet-title" id="sheetTitle"></div>
      <div class="sheet-sub" id="sheetSub"></div>
    </div>
    <button class="closeBtn" id="sheetClose">&#10005;</button>
  </div>
  <div id="sheetBody"></div>
</div>

<script>
(function() {
  const DATA = JSON.parse(document.getElementById('gtfs-data').textContent);
  const svg = document.getElementById('map');
  const NS = 'http://www.w3.org/2000/svg';

  const lineNames = Object.keys(DATA.line_meta);
  const activeLines = new Set(lineNames);

  // ---- state ----
  let day = 'MonFri';
  let simTime = 8 * 3600;       // seconds since midnight
  let speed = 30;               // sim seconds per real second
  let running = true;
  let realtime = true;
  let selected = null;          // { type:'station', stopId, line } | { type:'train', id }

  const SPEED_STEPS = [1, 5, 10, 30, 60, 120, 300];

  // ---- build static map: tracks + stops ----
  const stopDotEls = {}; // stopId+'|'+line -> circle el
  for (const line of lineNames) {
    const meta = DATA.line_meta[line];
    const shapeId = DATA.shape_by_line[line];
    const pts = DATA.shapes[shapeId];
    if (pts) {
      const path = document.createElementNS(NS, 'polyline');
      path.setAttribute('points', pts.map(p => p.join(',')).join(' '));
      path.setAttribute('class', 'track line-' + line);
      path.setAttribute('stroke', meta.color);
      svg.appendChild(path);
    }
    const stopIds = DATA.stops_by_line[line] || [];
    for (const sid of stopIds) {
      const s = DATA.stops[sid];
      if (!s) continue;
      const c = document.createElementNS(NS, 'circle');
      c.setAttribute('cx', s.x);
      c.setAttribute('cy', s.y);
      c.setAttribute('class', 'stopdot line-' + line);
      c.setAttribute('stroke', meta.color);
      c.dataset.stopId = sid;
      c.dataset.line = line;
      svg.appendChild(c);
      stopDotEls[sid + '|' + line] = c;

      c.addEventListener('mouseenter', (e) => showTooltip(stationTooltipText(sid, line), e));
      c.addEventListener('mousemove', moveTooltip);
      c.addEventListener('mouseleave', hideTooltip);
      c.addEventListener('click', (e) => {
        e.stopPropagation();
        selectStation(sid, line);
      });
    }
  }

  const trainsLayer = document.createElementNS(NS, 'g');
  trainsLayer.setAttribute('id', 'trainsLayer');
  svg.appendChild(trainsLayer);

  // ---- chips ----
  const chipsEl = document.getElementById('chips');
  const allChip = document.createElement('div');
  allChip.className = 'chip all';
  allChip.textContent = 'All / none';
  allChip.addEventListener('click', () => {
    const anyOff = lineNames.some(l => !activeLines.has(l));
    lineNames.forEach(l => anyOff ? activeLines.add(l) : activeLines.delete(l));
    refreshChips();
    applyVisibility();
  });
  chipsEl.appendChild(allChip);

  const chipEls = {};
  for (const line of lineNames) {
    const meta = DATA.line_meta[line];
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = '<span class="dot" style="background:' + meta.color + '"></span>' + line;
    chip.addEventListener('click', () => {
      if (activeLines.has(line)) activeLines.delete(line); else activeLines.add(line);
      refreshChips();
      applyVisibility();
      if (selected && selected.line === line && !activeLines.has(line)) closeSheet();
    });
    chipsEl.appendChild(chip);
    chipEls[line] = chip;
  }
  function refreshChips() {
    for (const line of lineNames) {
      chipEls[line].classList.toggle('off', !activeLines.has(line));
    }
  }
  function applyVisibility() {
    for (const line of lineNames) {
      const on = activeLines.has(line);
      svg.querySelectorAll('.line-' + line).forEach(el => {
        el.style.display = on ? '' : 'none';
      });
    }
  }

  // ---- precompute spawn schedules per line-direction-service ----
  const schedules = {};
  for (const key in DATA.lines) {
    const L = DATA.lines[key];
    const pattern = L.pattern;
    if (!pattern.length) continue;
    const duration = pattern[pattern.length - 1][2];
    const spawns = [];
    for (const [start, end, headway] of L.freq) {
      for (let t = start; t < end; t += headway) spawns.push(t);
    }
    schedules[key] = {
      line: L.line, direction: L.direction, headsign: L.headsign,
      duration, pattern, spawns, freq: L.freq, color: DATA.line_meta[L.line].color
    };
  }

  function destFromHeadsign(hs) {
    const m = /to (.+)$/i.exec(hs || '');
    return m ? m[1] : hs;
  }

  function currentHeadwaySec(freqArr, t) {
    for (const [s, e, h] of freqArr) { if (t >= s && t < e) return h; }
    return null;
  }

  // ---- KL local time helper (Asia/Kuala_Lumpur, UTC+8, no DST) ----
  const fmt = new Intl.DateTimeFormat('en-US', {
    timeZone: 'Asia/Kuala_Lumpur', hour12: false,
    hour: '2-digit', minute: '2-digit', second: '2-digit', weekday: 'short'
  });
  function getKLNow() {
    const parts = fmt.formatToParts(new Date());
    const map = {};
    parts.forEach(p => map[p.type] = p.value);
    const sec = (parseInt(map.hour) % 24) * 3600 + parseInt(map.minute) * 60 + parseInt(map.second);
    const wd = map.weekday;
    const dayGroup = (wd === 'Sat') ? 'Sat' : (wd === 'Sun') ? 'Sun' : 'MonFri';
    return { sec, dayGroup };
  }

  function fmtClock(sec) {
    sec = ((sec % 86400) + 86400) % 86400;
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = Math.floor(sec % 60);
    const pad = n => String(n).padStart(2, '0');
    return pad(h) + ':' + pad(m) + ':' + pad(s);
  }

  function fmtCountdown(sec) {
    sec = Math.max(0, Math.round(sec));
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    if (m <= 0) return s + 's';
    return m + 'm ' + String(s).padStart(2, '0') + 's';
  }

  function fmtMinTag(sec) {
    const m = Math.round(sec / 60);
    return 'every ' + m + ' min';
  }

  // ---- lerp helper ----
  function lerp(a, b, t) { return a + (b - a) * t; }

  // ---- train pool ----
  const pool = [];
  let currentTrains = [];
  function getCircle(i) {
    if (pool[i]) return pool[i];
    const c = document.createElementNS(NS, 'circle');
    c.setAttribute('class', 'train');
    trainsLayer.appendChild(c);
    pool[i] = c;
    c.addEventListener('mouseenter', (e) => {
      const tr = currentTrains[i];
      if (tr) showTooltip(trainTooltipText(tr), e);
    });
    c.addEventListener('mousemove', moveTooltip);
    c.addEventListener('mouseleave', hideTooltip);
    c.addEventListener('click', (e) => {
      e.stopPropagation();
      const tr = currentTrains[i];
      if (tr) selectTrain(tr.id);
    });
    return c;
  }

  function computeTrains(t) {
    const out = [];
    for (const key in schedules) {
      const sch = schedules[key];
      const parts = key.split('_');
      const service = parts[parts.length - 1];
      if (service !== day) continue;
      if (!activeLines.has(sch.line)) continue;
      for (const spawn of sch.spawns) {
        if (t < spawn || t > spawn + sch.duration) continue;
        const elapsed = t - spawn;
        const pat = sch.pattern;
        let idx = 0;
        while (idx < pat.length - 1 && pat[idx + 1][1] < elapsed) idx++;
        const cur = pat[idx];
        const nxt = pat[idx + 1];
        let x, y, dwell = false;
        if (!nxt) {
          const s = DATA.stops[cur[0]];
          x = s.x; y = s.y; dwell = true;
        } else if (elapsed <= cur[2]) {
          const s = DATA.stops[cur[0]];
          x = s.x; y = s.y; dwell = true;
        } else if (elapsed >= nxt[1]) {
          const s = DATA.stops[nxt[0]];
          x = s.x; y = s.y; dwell = true;
        } else {
          const a = DATA.stops[cur[0]], b = DATA.stops[nxt[0]];
          const frac = (elapsed - cur[2]) / (nxt[1] - cur[2]);
          x = lerp(a.x, b.x, frac);
          y = lerp(a.y, b.y, frac);
        }
        out.push({
          id: key + '|' + spawn, key, spawn, elapsed, x, y, dwell,
          line: sch.line, color: sch.color, direction: sch.direction, headsign: sch.headsign,
          curStopId: cur[0], nextStopId: nxt ? nxt[0] : null,
          etaNext: nxt ? Math.max(0, nxt[1] - elapsed) : 0,
          etaTerminus: Math.max(0, sch.duration - elapsed),
          duration: sch.duration
        });
      }
    }
    return out;
  }

  function render() {
    currentTrains = computeTrains(simTime);
    for (let i = 0; i < currentTrains.length; i++) {
      const c = getCircle(i);
      const tr = currentTrains[i];
      c.setAttribute('cx', tr.x.toFixed(1));
      c.setAttribute('cy', tr.y.toFixed(1));
      c.setAttribute('fill', tr.color);
      c.classList.toggle('dwell', tr.dwell);
      c.classList.toggle('pinned', !!selected && selected.type === 'train' && selected.id === tr.id);
      c.style.display = '';
    }
    for (let i = currentTrains.length; i < pool.length; i++) {
      if (pool[i]) pool[i].style.display = 'none';
    }
    document.getElementById('clock').textContent = fmtClock(simTime);
    document.getElementById('trainCount').textContent = currentTrains.length + ' train' + (currentTrains.length === 1 ? '' : 's') + ' active';

    if (selected) updateSheet();
  }

  // ---- tooltip ----
  const tooltipEl = document.getElementById('tooltip');
  function showTooltip(html, e) {
    tooltipEl.innerHTML = html;
    tooltipEl.style.display = 'block';
    moveTooltip(e);
  }
  function moveTooltip(e) {
    tooltipEl.style.left = (e.clientX + 14) + 'px';
    tooltipEl.style.top = (e.clientY + 14) + 'px';
  }
  function hideTooltip() { tooltipEl.style.display = 'none'; }

  function stationTooltipText(stopId, line) {
    const s = DATA.stops[stopId];
    const meta = DATA.line_meta[line];
    const next = nextArrivalAcrossDirections(stopId, line);
    const soon = next ? fmtCountdown(next.eta) + ' \u2192 ' + destFromHeadsign(next.headsign) : 'no more trains today';
    return '<div class="tt-title">' + s.name + '</div><div class="tt-line">' + meta.name + '</div><div>' + soon + '</div>';
  }
  function trainTooltipText(tr) {
    const meta = DATA.line_meta[tr.line];
    const dest = destFromHeadsign(tr.headsign);
    const status = tr.dwell ? 'at ' + DATA.stops[tr.curStopId].name : 'next: ' + DATA.stops[tr.nextStopId].name + ' in ' + fmtCountdown(tr.etaNext);
    return '<div class="tt-title">' + meta.name + '</div><div class="tt-line">towards ' + dest + '</div><div>' + status + '</div>';
  }

  function nextArrivalAcrossDirections(stopId, line) {
    let best = null;
    for (const dir of [0, 1]) {
      const key = line + '_' + dir + '_' + day;
      const sch = schedules[key];
      if (!sch) continue;
      const idx = sch.pattern.findIndex(p => p[0] === stopId);
      if (idx === -1) continue;
      const arrOffset = sch.pattern[idx][1];
      for (const spawn of sch.spawns) {
        const abs = spawn + arrOffset;
        if (abs >= simTime && (!best || abs < best.abs)) {
          best = { abs, eta: abs - simTime, headsign: sch.headsign };
        }
      }
    }
    return best;
  }

  function stationArrivals(stopId, line) {
    const dirs = [];
    for (const dir of [0, 1]) {
      const key = line + '_' + dir + '_' + day;
      const sch = schedules[key];
      if (!sch) continue;
      const idx = sch.pattern.findIndex(p => p[0] === stopId);
      if (idx === -1) continue;
      const arrOffset = sch.pattern[idx][1];
      const arrivals = [];
      for (const spawn of sch.spawns) {
        const abs = spawn + arrOffset;
        if (abs >= simTime) arrivals.push(abs - simTime);
      }
      arrivals.sort((a, b) => a - b);
      dirs.push({
        dir, headsign: sch.headsign, dest: destFromHeadsign(sch.headsign),
        headway: currentHeadwaySec(sch.freq, simTime),
        arrivals: arrivals.slice(0, 3)
      });
    }
    return dirs;
  }

  // ---- selection / sheet ----
  const overlayEl = document.getElementById('overlay');
  const sheetEl = document.getElementById('sheet');
  const sheetTitle = document.getElementById('sheetTitle');
  const sheetSub = document.getElementById('sheetSub');
  const sheetBody = document.getElementById('sheetBody');

  function openSheet() {
    overlayEl.classList.add('open');
    sheetEl.classList.add('open');
  }
  function closeSheet() {
    overlayEl.classList.remove('open');
    sheetEl.classList.remove('open');
    selected = null;
    render();
  }
  document.getElementById('sheetClose').addEventListener('click', closeSheet);
  overlayEl.addEventListener('click', closeSheet);
  document.addEventListener('click', (e) => {
    if (!selected) return;
    if (sheetEl.contains(e.target)) return;
    closeSheet();
  });

  function selectStation(stopId, line) {
    selected = { type: 'station', stopId, line };
    openSheet();
    updateSheet();
    render();
  }
  function selectTrain(id) {
    selected = { type: 'train', id };
    openSheet();
    updateSheet();
    render();
  }

  function updateSheet() {
    if (!selected) return;
    if (selected.type === 'station') {
      const s = DATA.stops[selected.stopId];
      const meta = DATA.line_meta[selected.line];
      sheetTitle.innerHTML = '<span class="swatch" style="background:' + meta.color + '"></span>' + s.name;
      sheetSub.textContent = meta.name;
      const dirs = stationArrivals(selected.stopId, selected.line);
      if (!dirs.length) {
        sheetBody.innerHTML = '<div class="sheet-row"><span class="rowlabel">No scheduled trains for this day.</span></div>';
        return;
      }
      sheetBody.innerHTML = dirs.map(d => {
        const chips = d.arrivals.length
          ? d.arrivals.map(a => '<span class="arrival-chip">' + fmtCountdown(a) + '</span>').join('')
          : '<span class="rowlabel">no more trains today</span>';
        const hw = d.headway ? fmtMinTag(d.headway) : '\u2014';
        return '<div class="direction-block">'
          + '<div class="dirlabel"><span>Towards ' + d.dest + '</span><span>' + hw + '</span></div>'
          + '<div>' + chips + '</div>'
          + '</div>';
      }).join('');
    } else if (selected.type === 'train') {
      const tr = currentTrains.find(x => x.id === selected.id);
      if (!tr) { closeSheet(); return; }
      const meta = DATA.line_meta[tr.line];
      const dest = destFromHeadsign(tr.headsign);
      sheetTitle.innerHTML = '<span class="swatch" style="background:' + meta.color + '"></span>' + meta.name;
      sheetSub.textContent = 'Towards ' + dest;
      const statusRow = tr.dwell
        ? ['At station', DATA.stops[tr.curStopId].name]
        : ['Next stop', DATA.stops[tr.nextStopId].name + ' in ' + fmtCountdown(tr.etaNext)];
      sheetBody.innerHTML = ''
        + '<div class="sheet-row"><span class="rowlabel">' + statusRow[0] + '</span><span class="rowval">' + statusRow[1] + '</span></div>'
        + '<div class="sheet-row"><span class="rowlabel">Arrives ' + dest + '</span><span class="rowval">' + fmtCountdown(tr.etaTerminus) + '</span></div>';
    }
  }

  // ---- controls wiring ----
  function leaveRealtime() {
    if (realtime) { realtime = false; nowBtn.classList.remove('active'); }
  }

  const playBtn = document.getElementById('playBtn');
  playBtn.addEventListener('click', () => {
    if (realtime) { leaveRealtime(); running = true; }
    else { running = !running; }
    playBtn.textContent = running ? 'Pause' : 'Play';
  });

  const speedInput = document.getElementById('speed');
  const speedLabel = document.getElementById('speedLabel');
  function updateSpeedLabel() { speedLabel.textContent = SPEED_STEPS[speedInput.value] + 'x'; }
  speedInput.addEventListener('input', () => {
    speed = SPEED_STEPS[speedInput.value];
    updateSpeedLabel();
    leaveRealtime();
    running = true;
    playBtn.textContent = 'Pause';
  });
  updateSpeedLabel();
  speed = SPEED_STEPS[speedInput.value];

  const nowBtn = document.getElementById('nowBtn');
  function jumpToNow() {
    const kl = getKLNow();
    simTime = kl.sec;
    day = kl.dayGroup;
    daySelect.value = day;
    realtime = true;
    running = true;
    playBtn.textContent = 'Pause';
    nowBtn.classList.add('active');
  }
  nowBtn.addEventListener('click', jumpToNow);

  const daySelect = document.getElementById('daySelect');
  daySelect.addEventListener('change', () => {
    day = daySelect.value;
    leaveRealtime();
    closeSheet();
  });

  // ---- animation loop ----
  let lastTs = null;
  function frame(ts) {
    if (lastTs === null) lastTs = ts;
    const dtReal = (ts - lastTs) / 1000;
    lastTs = ts;

    if (realtime) {
      const kl = getKLNow();
      simTime = kl.sec;
      if (day !== kl.dayGroup) { day = kl.dayGroup; daySelect.value = day; }
    } else if (running) {
      simTime += dtReal * speed;
      if (simTime >= 86400) simTime -= 86400;
      if (simTime < 0) simTime += 86400;
    }
    render();
    requestAnimationFrame(frame);
  }

  jumpToNow();
  refreshChips();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
