<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Rail Timing Board</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<main>
			<section class="settings-panel">
				<label>
					<input type="checkbox" id="simulated-time-toggle" />
					Use Simulated Time
				</label>
				<div id="simulated-time-controls" class="hidden">
					<input type="datetime-local" id="simulated-datetime" />
				</div>
				<div class="current-time-display">
					Current Time: <span id="clock">--:--:--</span>
				</div>
			</section>

			<section class="search-section">
				<div class="search-container">
					<input
						type="text"
						id="station-search"
						placeholder="Search for a station (e.g. KLCC)..."
						autocomplete="off"
					/>
					<div id="search-results" class="dropdown hidden"></div>
				</div>
			</section>

			<section id="pinned-stations" class="stations-container">
				<div class="loading" id="main-loading">Loading timetable data...</div>
				<!-- Station cards go here -->
			</section>
		</main>

		<template id="station-card-template">
			<div class="station-card" data-stop-id="">
				<div class="station-header">
					<h2 class="station-name">Station Name</h2>
					<button class="unpin-btn" aria-label="Unpin station">✖</button>
				</div>
				<div class="platforms-container">
					<!-- Direction 0 -->
					<div class="platform" data-dir="0">
						<!-- <h3 class="platform-title">Direction 1</h3> -->
						<div class="trains-list"></div>
					</div>
					<!-- Direction 1 -->
					<div class="platform" data-dir="1">
						<!-- <h3 class="platform-title">Direction 2</h3> -->
						<div class="trains-list"></div>
					</div>
				</div>
			</div>
		</template>

		<template id="train-row-template">
			<div class="train-row">
				<div class="train-route">
					<span class="route-badge">Rt</span>
					<span class="train-headsign">Headsign</span>
				</div>
				<div class="train-time">
					<div class="time-primary">
						<span class="time-absolute">00:00</span>
						<span class="time-relative">-- min</span>
					</div>
					<span class="time-secondary hidden">00:00</span>
				</div>
			</div>
		</template>

		<script src="script.js"></script>
	</body>
</html>
